<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="text-align:center; padding-top:100px;">

<h1>Find the right heart 💖</h1>
<p>Only one of them knows how much I love you...</p>

<div id="gameArea"></div>

<script>
const gameArea = document.getElementById("gameArea");

// create hearts
for (let i = 0; i < 6; i++) {
    const heart = document.createElement("span");
    heart.innerHTML = "💖";
    heart.style.fontSize = "40px";
    heart.style.margin = "15px";
    heart.style.cursor = "pointer";

    heart.onclick = () => {
        if (i === 3) { // correct heart
            document.body.innerHTML = `
                <h1>I love you ❤️</h1>
                <h2>my chota chammach 💕</h2>
                <p>You found the one that feels like you.</p>
            `;
        } else {
            heart.style.opacity = "0.3";
        }
    };

    gameArea.appendChild(heart);
}
</script>

</body>
</html>
